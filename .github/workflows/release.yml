name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - name: Build all platforms
        run: |
          VERSION=${GITHUB_REF#refs/tags/}
          LDFLAGS="-s -w -X main.version=${VERSION}"

          # macOS
          GOOS=darwin GOARCH=amd64 go build -ldflags "${LDFLAGS}" -o dist/dexfinder-darwin-amd64 ./cmd/dexfinder/
          GOOS=darwin GOARCH=arm64 go build -ldflags "${LDFLAGS}" -o dist/dexfinder-darwin-arm64 ./cmd/dexfinder/

          # Linux
          GOOS=linux GOARCH=amd64 go build -ldflags "${LDFLAGS}" -o dist/dexfinder-linux-amd64 ./cmd/dexfinder/
          GOOS=linux GOARCH=arm64 go build -ldflags "${LDFLAGS}" -o dist/dexfinder-linux-arm64 ./cmd/dexfinder/

          # Windows
          GOOS=windows GOARCH=amd64 go build -ldflags "${LDFLAGS}" -o dist/dexfinder-windows-amd64.exe ./cmd/dexfinder/

          # Create archives
          cd dist
          for f in dexfinder-darwin-* dexfinder-linux-*; do
            tar czf "${f}.tar.gz" "${f}"
          done
          zip dexfinder-windows-amd64.zip dexfinder-windows-amd64.exe

      - name: Generate checksums
        run: |
          cd dist
          sha256sum *.tar.gz *.zip > checksums.txt

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/*.tar.gz
            dist/*.zip
            dist/checksums.txt

      - name: Update Homebrew Tap
        env:
          TAP_TOKEN: ${{ secrets.TAP_TOKEN }}
        run: |
          if [ -z "$TAP_TOKEN" ]; then
            echo "TAP_TOKEN not set, skipping Homebrew tap update"
            exit 0
          fi
          VERSION=${GITHUB_REF#refs/tags/v}
          SHA_DARWIN_ARM64=$(sha256sum dist/dexfinder-darwin-arm64.tar.gz | awk '{print $1}')
          SHA_DARWIN_AMD64=$(sha256sum dist/dexfinder-darwin-amd64.tar.gz | awk '{print $1}')
          SHA_LINUX_AMD64=$(sha256sum dist/dexfinder-linux-amd64.tar.gz | awk '{print $1}')
          SHA_LINUX_ARM64=$(sha256sum dist/dexfinder-linux-arm64.tar.gz | awk '{print $1}')

          cat > /tmp/dexfinder.rb << FORMULA
          class Dexfinder < Formula
            desc "Cross-platform APK/DEX method finder with call chain tracing"
            homepage "https://github.com/JuneLeGency/dexfinder"
            version "${VERSION}"
            license "Apache-2.0"

            on_macos do
              if Hardware::CPU.arm?
                url "https://github.com/JuneLeGency/dexfinder/releases/download/v${VERSION}/dexfinder-darwin-arm64.tar.gz"
                sha256 "${SHA_DARWIN_ARM64}"
              else
                url "https://github.com/JuneLeGency/dexfinder/releases/download/v${VERSION}/dexfinder-darwin-amd64.tar.gz"
                sha256 "${SHA_DARWIN_AMD64}"
              end
            end

            on_linux do
              if Hardware::CPU.arm?
                url "https://github.com/JuneLeGency/dexfinder/releases/download/v${VERSION}/dexfinder-linux-arm64.tar.gz"
                sha256 "${SHA_LINUX_ARM64}"
              else
                url "https://github.com/JuneLeGency/dexfinder/releases/download/v${VERSION}/dexfinder-linux-amd64.tar.gz"
                sha256 "${SHA_LINUX_AMD64}"
              end
            end

            def install
              bin.install Dir["dexfinder-*"].first => "dexfinder"
            end

            test do
              assert_match "dexfinder", shell_output("#{bin}/dexfinder --help 2>&1", 0)
            end
          end
          FORMULA

          git clone "https://x-access-token:${TAP_TOKEN}@github.com/JuneLeGency/homebrew-tap.git" /tmp/tap
          cp /tmp/dexfinder.rb /tmp/tap/Formula/dexfinder.rb
          cd /tmp/tap
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/dexfinder.rb
          git commit -m "Update dexfinder to ${VERSION}" || true
          git push
